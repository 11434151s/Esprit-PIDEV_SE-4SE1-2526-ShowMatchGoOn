apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: smgo-prod
data:
  application.properties: |
    spring.application.name=content-management
    spring.profiles.active=kubernetes
    server.port=8080
    server.servlet.context-path=/api
    logging.level.root=INFO
    logging.level.com.example.contentmanagement=DEBUG
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: smgo-prod
type: Opaque
stringData:
  SPRING_DATA_MONGODB_URI: mongodb://mongoadmin:MongoDB@Secure123!@mongodb:27017/smgo_db?authSource=admin
  JWT_SECRET: mySecureJWTSecretKeyThatIsAtLeastThirtyTwoCharactersLong12345
  JWT_EXPIRATION: "86400000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: smgo-prod
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/actuator/prometheus"
    spec:
      serviceAccountName: backend-sa
      containers:
      - name: backend
        image: ghcr.io/your-org/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: SPRING_DATA_MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: SPRING_DATA_MONGODB_URI
        - name: APP_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET
        - name: APP_JWT_EXPIRATION_MS
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_EXPIRATION
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/users/check/email/test@test.com
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/users/check/email/test@test.com
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop:
              - ALL
      securityContext:
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: smgo-prod
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: smgo-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: smgo-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: smgo-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: smgo-prod
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: smgo-prod
subjects:
- kind: ServiceAccount
  name: backend-sa
  namespace: smgo-prod
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
