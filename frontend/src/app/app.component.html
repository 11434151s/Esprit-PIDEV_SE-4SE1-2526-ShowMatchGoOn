<!-- Mode Switcher (top-right corner) -->
<div class="fixed top-4 right-4 z-[100] flex gap-2 bg-[#0B0E14]/80 backdrop-blur-xl border border-[#8B5CF6]/30 rounded-lg p-1">
  <button
    (click)="switchMode('admin')"
    class="px-4 py-2 rounded-md transition-all text-sm font-medium text-gray-400 hover:text-white hover:bg-[#8B5CF6]/20">
    Admin Panel
  </button>
  <button
    (click)="switchMode('user')"
    class="px-4 py-2 rounded-md transition-all text-sm font-medium text-gray-400 hover:text-white hover:bg-[#8B5CF6]/20">
    User Panel
  </button>
</div>

<!-- Router Outlet for Admin and User Layouts -->
<router-outlet></router-outlet>
